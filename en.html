<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllySim</title>
    <link rel="stylesheet" href="styles.css">
    <!-- SVG for modern, scalable Chrome browsers -->
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">

    <!-- PNG fallback and Android Chrome shortcut -->
    <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon.png">

</head>
<body>

<div id="game-container">
    <h1>The Journey of a Refugee</h1>
    <div id="scenario-container">
        <div id="scenario"></div>
    </div>
    
    <div id="btn-container" class="btn-container"></div>

    <div id="resources" class="fade-in">
        <h3>Make a <b>REAL</b> difference :</h3>
        <p>Social injustice is not a game. Here are some organisations who make a real difference in Canada :</p>
        <ul>
            <li style="margin-bottom: 10px;"><a href="https://ccrweb.ca/fr" target="_blank">Canadian Council for Refugees (CCR)</a></li>
            <li style="margin-bottom: 10px;"><a href="https://www.unicef.ca/fr" target="_blank">UNICEF Canada</a></li>
        </ul>
        </br>
        <p>Made by Corson Moise and Nolan Finlay</p>
        <button onclick="location.reload()" style="margin-top:10px;">Restart the simulation</button>
    </div>
</div>

<footer class="lang-footer">
    <a href="/en.html" class="lang-link">English</a>
    <a href="/fr.html" class="lang-link">Français</a>
</footer>

<script>
    const scenarioElement = document.getElementById('scenario');
    const btnContainer = document.getElementById('btn-container');
    const resourceDiv = document.getElementById('resources');

    const storyNodes = {
        1: {
            text: "You arrive in Canada after fleeing a conflict. You only have $200 and untranslated documents",
            options: [
                { text: "Go to a refugee shelter", nextNode: 2 },
                { text: "Spend $50 on a taxi to a distant relitives address", nextNode: 3 }
            ]
        },
        2: {
            text: "You arrive at a local shelter. Looking around, you see other refugees from all over the place.",
            options: [
                { text: "Wait 10 days for a free, official translator", nextNode: 7 },
                { text: "Look at the job board for open, availiable jobs", nextNode: 5 },
                { text: "Look for a lawyer to help with your documents", nextNode: 6 }
            ]
        },
        3: {
            text: "You spend $50 and get a taxi to your distants relitives house, the one who moved to Canada years ago. You walk up to their door, they anwser",
            options: [
                { text: "Ask to stay", nextNode: 4 }
            ]
        },
        4: {
            text: "Your relitive lets you stay on their couch as long as you pay rent. You pay the most of your remaining money. The next month rolls around",
            options: [
                { text: "Pool resources, relative helps translate docs unofficially", nextNode: 10 },
                { text: "Swallow pride, seek help before 30 day deadline", nextNode: 2 },
                { text: "Beg to stay even thought you have no remaining money ", nextNode: 11 },
            ]
        },


        5: {
            text: "On the board you find one job listing. There is a listing for...",
            options: [
                { text: "A entry level grocery store worker", nextNode: 16 },
                { text: "Change your mind, pay a Private Translator", nextNode: 18 }
            ]
        },
        6: {
            text: "You deside to look for a lawyer, minding that you're low on cash...",
            options: [
                { text: "Get more cash for good lawyer", nextNode: 17 },
                { text: "Choose the first lawyer you find", nextNode: 19 },
                { text: "Use cash to buy equipment", nextNode: 20 },
            ]
        },
        7: {
            text: "After 10 days the translator arrives. She translates your documents and you submit them, opening doors to employment",
            options: [
                { text: "Apply for local college ", nextNode: 8 },
                { text: "Find a government-placed entry-level job", nextNode: 9 },
            ]
        },
        8: {
            text: "You apply for a college... And you get accepted for classes and a student loan. You have the option to stay in dorms or in a shelter ",
            options: [
                { text: "Stay in shelter", nextNode: 12 },
                { text: "Stay in dorms", nextNode: 13 },
            ]
        },
        9: {
            text: "After a few weeks you are able to find a government-placed entry-level job, passing the interview. But now you get to choose, are you going to put in Bare Minimum Effort, or Extra Effort?",
            options: [
                { text: "Bare Minimum", nextNode: 15 },
                { text: "Extra Effort", nextNode: 14 },
            ]
        },


        10: {
            text: "Good Ending: Your relative helps translate docs unofficially, allowing you to submit on time. You build strong roots in your comunity and start a new job, eventually moving into your own house",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        11: {
            text: "Bad Ending: Kicked out mid-winter & Deported. Your relitive lets you stay, but overtime your relationship sours over money. Eventually your relitive kicks you out, mid winter. With the shelters full, you turn to the only way you can survive, looting. You eventually get caught, and having missed the document deadline, get deported",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        12: {
            text: "Good Ending: You deside to stay in a shelter while finishing collage. Because of this, you student loans were as high. You go on to live a sucessful comfortable life.",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        13: {
            text: "Normal Ending: You sucsessfully complete collage, with a little bit more Student Debt than you were expecting. Allthough it was more you eventually pay it off and go on to live a happy life",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        14: {
            text: "Good Ending: After a few years your hard work pays off when you get promoted to Manager. You life a nice life, you go on to live in a little apartment.",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        15: {
            text: "Normal Ending: Because you never desided to put in any effort you stay at your entry possition for a long time, never making it big. Life is a bit harder but your gratefull for your freedom",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        16: {
            text: "Bad Ending: You get the job at the store and start earning, but over time your employer starts exploiting you, witholding checks and gaslighting you. You miss your document deadline, you get Deported",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        17: {
            text: "On the board you find one job listing. There is a listing for...",
            options: [
                { text: "A Entry level groacery store worker", nextNode: 16 },
            ]
        },
        18: {
            text: "Normal Ending: You manage to pay a Private Translator just in time and turn your documents in, but broke now and poverty takes hold. You start working a minimum wage job, living pay cheque to paycheck",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        19: {
            text: "Bad Ending: You go on a computer at the local library and find a ad for a cheap lawyer. You reach out and they agree to help draft a Asylum claim, so you send all your remaining money, then 'Lawyer ghosts you. Now with no money the deadline for documents and asylum claim passes, you get Deported",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        },
        20: {
            text: "Good Ending: You find an excellent lawyer, he helps you with your documents and gets them turned in on time. You go on to start business, and eventually a immigrant shelter",
            options: [
                { text: "End simulation.", nextNode: 'end' }
            ]
        }
    };

    function startNode(nodeIndex) {
        btnContainer.innerHTML = '';
        scenarioElement.innerHTML = '';
        
        if (nodeIndex === 'end') {
            scenarioElement.innerHTML = "<div class='fade-in'>The simulation is over. In real life, choices are often impossible to make alone without access to basic resources.</div>";
            resourceDiv.style.display = 'block';
            return;
        }

        const node = storyNodes[nodeIndex];

        const textDiv = document.createElement('div');
        textDiv.className = 'fade-in';
        textDiv.innerText = node.text;
        scenarioElement.appendChild(textDiv);

        node.options.forEach((option, index) => {
            setTimeout(() => {
                const btn = document.createElement('button');
                btn.className = 'fade-in';
                btn.innerText = option.text;
                btn.onclick = () => startNode(option.nextNode);
                btnContainer.appendChild(btn);
            }, (index + 1) * 600); 
        });
    }

    startNode(1);
</script>

</body>
</html>
